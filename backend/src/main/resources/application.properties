spring.application.name=prjApp

# ========================
# 1. Server Configuration
# ========================
server.port=8080
    
# ========================
# 2. Datasource (MySQL)
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/prjAppDB?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Toan20032006@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# 3. JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# Tránh LazyInitializationException khi serialize JSON
spring.jpa.open-in-view=true

# ========================
# 4. Jackson (JSON Output)
# ========================
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ========================
# 5. Logging
# ========================
logging.level.JAVAGROUP.prjApp=DEBUG
logging.level.org.springframework.web=INFO

# Surface error messages to frontend
server.error.include-message=always
server.error.include-binding-errors=always