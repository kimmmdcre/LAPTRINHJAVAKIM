spring.application.name=prjApp

# ========================
# 1. Server Configuration
# ========================
server.port=8080
    
# ========================================
# 2. Datasource Configuration
# ========================================

# --- Option A: MySQL (Default) ---
spring.datasource.url=jdbc:mysql://localhost:3306/prjAppDB?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Toan20032006@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Option B: SQL Server (Uncomment to use) ---
# spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=prjAppDB;encrypt=true;trustServerCertificate=true
# spring.datasource.username=sa
# spring.datasource.password=YourStrongPassword
# spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ========================
# 3. JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Removed hardcoded MySQL8Dialect to allow automatic detection (MySQL/SQL Server/PostgreSQL/etc.)
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Tránh LazyInitializationException khi serialize JSON
spring.jpa.open-in-view=true

# ========================
# 4. Jackson (JSON Output)
# ========================
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ========================
# 5. Logging
# ========================
logging.level.javagroup.prjApp=DEBUG
logging.level.org.springframework.web=INFO

# Surface error messages to frontend
server.error.include-message=always
server.error.include-binding-errors=always

# ========================
# 6. JWT Configuration
# ========================
app.jwtSecret=9a4f2c8d3b7a1e5f8g9h0i1j2k3l4m5n6o7p8q9r
#Thời gian sống của token (1 ngày)
app.jwtExpirationMs=86400000  

