spring.application.name=prjApp

# ========================
# 1. Server Configuration
# ========================
server.port=8080

# ========================
# 2. Datasource (SQL Server)
# ========================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=prjAppDB;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ========================
# 3. JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
# Tránh LazyInitializationException khi serialize JSON
spring.jpa.open-in-view=false

# ========================
# 4. Jackson (JSON Output)
# ========================
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ========================
# 5. Logging
# ========================
logging.level.JAVAGROUP.prjApp=DEBUG
logging.level.org.springframework.web=INFO

# JWT (HS256 — đổi secret trong môi trường thật)
app.jwt.secret=laptrinhjavakim-prjApp-jwt-secret-key-min-32-characters-long!!
app.jwt.expiration-ms=86400000